openapi: 3.1.0
info:
  title: HellOOpass Platform API
  description: |
    # 🔥 HellOOpass Enterprise API v1.0

    ## 📋 Overview
    **HellOOpass** is a comprehensive digital payment and merchant management platform supporting financial inclusion across Africa. This API provides programmatic access to merchant management, customer operations, invoice processing, and WFP (World Food Programme) integration capabilities.

    ### ✨ Key Features
    - **Merchant & Customer Management** - Full lifecycle management of merchants and customers
    - **Payment Processing** - Invoice creation, BNPL (Buy Now Pay Later), and repayment tracking
    - **WFP Integration** - Specialized endpoints for World Food Programme operations
    - **Real-time Reporting** - Comprehensive financial and operational analytics
    - **Multi-country Support** - Ethiopia (ET), Kenya (KE), Senegal (SN), Guinea-Bissau (GW)

    ### 🚀 Quick Start
    1. **Get Authentication Token**
    ```bash
    curl -X POST https://api.helloomarket.com/v1/auth/login \
      -H "Content-Type: application/json" \
      -d '{"username":"your_username","password":"your_password"}'
    ```

    2. **Make Your First API Call**
    ```bash
    curl -X GET https://api.helloomarket.com/v1/merchants \
      -H "Authorization: Bearer YOUR_TOKEN" \
      -H "X-API-Key: YOUR_API_KEY"
    ```

    ---
    *Documentation last updated: 2024-01-22*

  version: 1.0.11
  termsOfService: https://helloomarket.com/legal/api-terms
  contact:
    name: HellOOpass API Team
    email: api@helloomarket.com
    url: https://helloomarket.com/support/api
  license:
    name: HellOOpass Proprietary License
    url: https://helloomarket.com/legal/license

servers:
  - url: https://api.helloomarket.com/v1
    description: Production Environment
  - url: https://staging-api.helloomarket.com/v1
    description: Staging Environment
  - url: http://localhost:4000
    description: Local Development

tags:
  - name: Authentication
    description: User authentication and token management
  - name: Merchants
    description: Merchant account management and operations
  - name: Customers
    description: Customer management and transactions
  - name: Invoices
    description: Invoice creation, retrieval, and management
  - name: Payments
    description: Payment processing and history
  - name: Suppliers
    description: Supplier registration and product management
  - name: Projects
    description: Project configuration and management
  - name: WFP Operations
    description: World Food Programme specific operations
  - name: Reports
    description: Financial and operational reporting
  - name: Wallets
    description: Wallet operations and transaction history

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /login endpoint

  parameters:
    PaginationLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50
        example: 50
      description: Number of items to return per page

    PaginationPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
        example: 1
      description: Page number for pagination

    CountryCode:
      name: countryCode
      in: query
      required: false
      schema:
        type: string
        enum: [ET, KE, SN, GW]
        default: ET
        example: ET
      description: ISO 3166-1 alpha-2 country code

    MobileNumber:
      name: mobile
      in: query
      required: false
      schema:
        type: string
        pattern: '^\+[1-9]\d{1,14}$'
        example: "+251912345678"
      description: Mobile number in E.164 format

    DateRangeStart:
      name: start
      in: query
      required: false
      schema:
        type: string
        format: date
        example: "2024-01-01"
      description: Start date for filtering

    DateRangeEnd:
      name: end
      in: query
      required: false
      schema:
        type: string
        format: date
        example: "2024-12-31"
      description: End date for filtering

    ActiveStatus:
      name: active
      in: query
      required: false
      schema:
        type: string
        enum: ["0", "1"]
        default: "1"
        example: "1"
      description: Filter by active status

  responses:
    BadRequest400:
      description: Bad request - Invalid parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: boolean
                example: true
              message:
                type: string
                example: "Invalid or missing parameters"

    Unauthorized401:
      description: Unauthorized - Invalid authentication
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: boolean
                example: true
              message:
                type: string
                example: "Authentication required or invalid token"

    InternalServerError500:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: boolean
                example: true
              message:
                type: string
                example: "An internal server error occurred"

paths:
  # ========================
  # 🔐 AUTHENTICATION
  # ========================
  /login:
    post:
      tags: [Authentication]
      summary: User Authentication
      description: Authenticate user and obtain JWT token for API access
      operationId: authenticateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: "admin@helloomarket.com"
                password:
                  type: string
                  format: password
                  example: "SecurePass123!"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  message:
                    type: string
                    example: "Authentication successful"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "500":
          $ref: "#/components/responses/InternalServerError500"
      security: []

  # ========================
  # 🏪 MERCHANTS
  # ========================
  /dube/international/getmerchantlist.php:
    get:
      tags: [Merchants]
      summary: Get Merchant List
      description: Retrieves a paginated list of merchants with filtering capabilities
      operationId: getMerchantList
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PaginationLimit"
        - name: Page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            example: 1
        - name: userId
          in: query
          description: Unique 6-digit user identifier
          required: false
          schema:
            type: integer
            example: 123456
        - $ref: "#/components/parameters/MobileNumber"
        - name: project
          in: query
          description: Project name filter
          required: false
          schema:
            type: string
            example: "Palladium"
        - $ref: "#/components/parameters/CountryCode"
        - $ref: "#/components/parameters/ActiveStatus"
      responses:
        "200":
          description: Merchant list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  totalCount:
                    type: string
                    example: "2792"
                  message:
                    type: array
                    items:
                      type: object
                      properties:
                        userid:
                          type: string
                          example: "123456"
                        fullname:
                          type: string
                          example: "Hello Shop"
                        businessName:
                          type: string
                          example: "Hello Shop"
                        mobile:
                          type: string
                          example: "251912345678"
                        createdon:
                          type: string
                          example: "2024-11-12 07:08:55"
                        project:
                          type: string
                          example: "Palladium"
                        initialdeposit:
                          type: string
                          example: "0.00"
                        bnpl:
                          type: string
                          example: "0.00"
                        active:
                          type: string
                          example: "1"
                        lastTrxnDate:
                          type: string
                          example: "2024-11-15 14:46:27"
                        language:
                          type: string
                          example: "en"
                        wallets:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                example: "1234567890"
                              wallettype:
                                type: string
                                example: "MERCHANT_AVAILABLE"
                              balance:
                                type: string
                                example: "2000000"
                              bnpl:
                                type: string
                                example: "2000000"
                        foodCategory:
                          type: string
                          example: "desert"
        "400":
          $ref: "#/components/responses/BadRequest400"
        "401":
          $ref: "#/components/responses/Unauthorized401"
        "500":
          $ref: "#/components/responses/InternalServerError500"

